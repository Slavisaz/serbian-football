<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serbian Football</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.jfif" />
    <span>SERBIAN <b>FOOTBALL</b></span>
  </div>

  <nav>
    <a>News</a>
    <a>Standings</a>
    <a>Results</a>
    <a>Schedule</a>
    <a>Videos</a>
  </nav>
</header>

<div class="ad">ADVERTISEMENT</div>

<main class="layout">

  <!-- LEFT SIDE -->
  <section>

    <!-- HERO -->
    <div id="hero" class="hero">
      Loading headline...
    </div>

    <!-- STANDINGS -->
    <div class="card">
      <h2>Serbian SuperLiga</h2>
      <table id="standings"></table>
    </div>

    <!-- RESULTS + MATCHES -->
    <div class="grid-2">
      <div class="card">
        <h3>Recent Results</h3>
        <div id="results"></div>
      </div>

      <div class="card">
        <h3>Upcoming Matches</h3>
        <div id="matches"></div>
      </div>
    </div>

    <!-- VIDEOS -->
    <div class="card">
      <h2>Latest Videos</h2>
      <div id="videos" class="videos"></div>
    </div>

  </section>

  <!-- RIGHT SIDEBAR -->
  <aside>

    <div class="card">
      <h3>AI Football Agent</h3>
      <div id="ai-news"></div>
    </div>

    <div class="card">
      <h3>Top Stories</h3>
      <div id="top-news"></div>
    </div>

    <div class="ad small">ADS</div>

  </aside>

</main>

<script src="app.js"></script>
</body>
</html>
