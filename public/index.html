<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Serbian Football</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="logo.png" />
    <div>
      <h1>SERBIAN <span>FOOTBALL</span></h1>
      <p>Latest Serbian football news</p>
    </div>
  </div>

  <nav>
    <a href="#">News</a>
    <a href="#">Standings</a>
    <a href="#">Results</a>
    <a href="#">Schedule</a>
    <a href="#">Videos</a>
  </nav>
</header>

<div class="container">

  <div class="main">

    <div id="hero"></div>

    <div class="card">
      <h2>Serbian SuperLiga</h2>
      <p>Standings coming next step.</p>
    </div>

    <div class="grid">
      <div class="card">Recent Results</div>
      <div class="card">Upcoming Matches</div>
    </div>

    <div class="card">
      <h2>Latest Videos</h2>
    </div>

  </div>

  <aside class="sidebar">
    <h3>AI Football Agent</h3>
    <div id="news-list"></div>
  </aside>

</div>

<script src="app.js"></script>
</body>
</html>
