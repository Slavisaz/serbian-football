<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Football</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="logo-wrap">
    <img src="logo.svg" class="logo">
    <h1>SERBIAN FOOTBALL</h1>
  </div>
  <nav>
    <a href="#">News</a>
    <a href="#">Standings</a>
    <a href="#">Results</a>
    <a href="#">Schedule</a>
    <a href="#">Videos</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-overlay">
    <div class="tag">LATEST NEWS</div>
    <h2 id="hero-title">Loading...</h2>
    <p id="hero-meta"></p>
  </div>
</div>

<div class="container">
  <div class="left">
    <div class="card">Serbian SuperLiga</div>
    <div class="grid">
      <div class="card">Recent Results</div>
      <div class="card">Upcoming Matches</div>
    </div>
    <div class="card">Latest Videos</div>
  </div>

  <div class="right">
    <div class="card">
      <h3>AI Football Agent</h3>
      <div id="news"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
