<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Football</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; color:#111; }
header { background:#fff; padding:15px; border-bottom:1px solid #ddd; position:sticky; top:0; }
h1 { margin:0; font-size:22px; }
nav { margin-top:5px; font-size:14px; color:#555; }
.container { padding:15px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; }
.hero img { width:100%; border-radius:10px; }
.section-title { border-left:4px solid red; padding-left:10px; margin:20px 0 10px; }
.ad { background:#eee; text-align:center; padding:20px; margin:15px 0; border-radius:10px; font-size:12px; color:#777; }
iframe { width:100%; height:200px; border:none; border-radius:10px; }
button { background:red; color:#fff; border:none; padding:10px; border-radius:5px; }
</style>
</head>

<body>

<header>
  <h1>Serbian Football</h1>
  <nav>SuperLiga | Prva Liga | National Team | Videos</nav>
</header>

<div class="container">

<div class="ad">AdSense Banner</div>

<div class="card hero">
  <img src="https://via.placeholder.com/800x400">
  <h2>Serbia wins latest international match</h2>
  <p>AI-generated summary of the latest football news...</p>
</div>

<div class="ad">In-Article Ad</div>

<h3 class="section-title">Latest News</h3>
<div id="news"></div>

<h3 class="section-title">SuperLiga Table</h3>
<div id="table"></div>

<h3 class="section-title">Latest Videos</h3>
<div id="videos"></div>

</div>

<script>
// RSS News
async function loadNews() {
  const rssUrl = "https://api.allorigins.win/raw?url=https://www.mozzartsport.com/rss";
  const res = await fetch(rssUrl);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");
  const items = xml.querySelectorAll("item");
  let html = "";
  items.forEach((item, i) => {
    if (i > 5) return;
    const title = item.querySelector("title").textContent;
    const desc = item.querySelector("description").textContent;
    html += `<div class="card"><h4>${title}</h4><p>${desc}</p></div>`;
  });
  document.getElementById("news").innerHTML = html;
}
loadNews();

// Dummy table
document.getElementById("table").innerHTML = "<div class='card'>1. Red Star<br>2. Partizan<br>3. TSC</div>";

// YouTube videos
document.getElementById("videos").innerHTML = `
<iframe src="https://www.youtube.com/embed/ysz5S6PUM-U"></iframe>
<iframe src="https://www.youtube.com/embed/ysz5S6PUM-U"></iframe>
`;
</script>

</body>
</html>
