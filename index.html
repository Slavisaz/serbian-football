<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serbian Football</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="top-header">

  <div class="top-bar">
    <div class="menu-icon">☰</div>

    <div class="logo-wrap">
      <img src="logo.png" alt="Serbian Football" class="main-logo"/>
      <span class="main-title">SERBIAN FOOTBALL</span>
    </div>

    <div class="header-meta">
      <span class="status-dot"></span>
      <span id="refreshLabel">Loading...</span>
    </div>
  </div>

  <nav class="main-nav">
    <a href="#">LIVE</a>
    <a href="#">TODAY</a>
    <a href="#">TABLES</a>
    <a href="#">NEWS</a>
    <a href="#">CLUBS</a>
  </nav>

</header>

<main class="container">

  <section class="hero">
    <h1>Serbian Football Live</h1>
    <p>Scores, fixtures, standings and AI updates.</p>
  </section>

  <section class="grid">

    <div class="card">
      <h2>Live Matches</h2>
      <div id="liveList">Loading...</div>
    </div>

    <div class="card">
      <h2>Today / Next</h2>
      <div id="fixturesList">Loading...</div>
    </div>

    <div class="card full">
      <h2>SuperLiga Table</h2>
      <div id="standingsTable">Loading...</div>
    </div>

    <div class="card">
      <h2>Main Teams</h2>
      <div id="teamsGrid">Loading...</div>
    </div>

    <div class="card">
      <h2>Latest News</h2>
      <div id="newsList">Loading...</div>
    </div>

  </section>

</main>

<script>
window.SERBIAN_FOOTBALL_API_BASE = 'https://serbian-football-api.slavisa-cf8.workers.dev';
</script>

<script src="app.js"></script>

</body>
</html>
