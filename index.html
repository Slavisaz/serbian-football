<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Football</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="assets/logo.png">
    <span>SERBIAN FOOTBALL</span>
  </div>
  <nav>
    <a href="#news">News</a>
    <a href="#standings">Standings</a>
    <a href="#videos">Videos</a>
  </nav>
</header>

<main class="container">

<section class="left">
  <div class="card big">Main News Headline</div>
  <div class="grid">
    <div class="card">News 1</div>
    <div class="card">News 2</div>
    <div class="card">News 3</div>
    <div class="card">News 4</div>
  </div>
</section>

<aside class="right">
  <div class="card">
    <h3>Standings</h3>
    <table>
      <tr><th>#</th><th>Club</th><th>Pts</th></tr>
      <tr><td>1</td><td>Partizan</td><td>60</td></tr>
      <tr><td>2</td><td>Zvezda</td><td>58</td></tr>
    </table>
  </div>

  <div class="card">
    <h3>Videos</h3>
    <div class="video">Video area</div>
  </div>
</aside>

</main>

<script src="app.js"></script>
</body>
</html>
