<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serbian Football</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="header">
  <div class="logo">SERBIAN FOOTBALL ⚽</div>
</header>

<div id="ticker" class="ticker"></div>

<section class="hero">
  <div class="hero-text">
    <h1>Serbian Football. Live scores, fixtures, tables and latest headlines.</h1>
  </div>
  <div class="hero-side">
    <h3>Featured Story</h3>
    <h2 id="featuredTitle"></h2>
    <p id="featuredSource"></p>
  </div>
</section>

<section class="news">
  <h2>Latest News</h2>
  <div id="newsList"></div>
</section>

<script src="app.js"></script>
</body>
</html>
