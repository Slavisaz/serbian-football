<!DOCTYPE html>
<html>
<head>
  <title>Serbian Football</title>
</head>
<body>
  <h1>Serbian Football API</h1>
  <pre id="output"></pre>

  <script>
    fetch("/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("output").textContent = JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById("output").textContent = err;
      });
  </script>
</body>
</html>
